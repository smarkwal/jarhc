site_name: JarHC - JAR Health Check
site_description: JarHC is a static analysis tool to help you find your way through 'JAR hell'.
site_url: https://jarhc.org/latest/
site_author: Stephan Markwalder

repo_url: https://github.com/smarkwal/jarhc
repo_name: smarkwal/jarhc
edit_uri: edit/main/website/docs/

copyright: JarHC - JAR Health Check | <a href="https://jarhc.org">jarhc.org</a>

# Validation of internal links, anchors, and navigation.
# These warnings become errors when building with --strict.
validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: warn
    unrecognized_links: warn

theme:
  name: material
  favicon: assets/jarhc-logo.png
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Quick-start: quick-start.md
  - Usage: usage.md
  - Walk-through: walk-through.md
  - Gradle Plugin: gradle-plugin.md
  - Reports:
      - Overview: reports/index.md
      - JAR Files: reports/jar-files.md
      - Vulnerabilities: reports/vulnerabilities.md
      - Dependencies: reports/dependencies.md
      - Duplicate Classes: reports/duplicate-classes.md
      - Binary Compatibility: reports/binary-compatibility.md
      - Blacklist: reports/blacklist.md
      - JAR Manifests: reports/jar-manifests.md
      - JPMS Modules: reports/jpms-modules.md
      - OSGi Bundles: reports/osgi-bundles.md
      - Java Runtime: reports/java-runtime.md
  - Release Notes:
      - Version 3.0.0: releases/v3.0.0.md
  - Project: project.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra:
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/smarkwal/jarhc

# Files kept in the repo but not part of the published site:
#  - logo source
exclude_docs: |
  assets/jarhc-logo.pptx
