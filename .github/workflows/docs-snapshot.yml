name: Docs Snapshot

# Publish the "snapshot" docs version (current master) to GitHub Pages.
# Releases are published by docs-release.yml.

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'docs-requirements.txt'
      - '.github/workflows/docs-snapshot.yml'
  workflow_dispatch:

permissions:
  contents: write

# Serialize all deployments to the gh-pages branch to avoid push conflicts.
concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy snapshot
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.x'
        cache: pip
        cache-dependency-path: docs-requirements.txt

    - name: Install dependencies
      run: pip install -r docs-requirements.txt

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Deploy snapshot docs
      run: mike deploy --push snapshot

    # Make sure the site root (https://smarkwal.github.io/jarhc/) redirects
    # somewhere so it never returns 404. Released versions own the "latest"
    # alias and the default (set by docs-release.yml); until the first release
    # is published, fall back to pointing the root at "snapshot".
    - name: Ensure the site root has a default version
      run: |
        if mike list 2>/dev/null | grep -q '\[.*latest.*\]'; then
          echo "A released version already owns 'latest'; leaving the default unchanged."
        else
          echo "No released version yet; pointing the site root at 'snapshot'."
          mike set-default --push snapshot
        fi
