name: Release Test

on:
  workflow_dispatch:
    inputs:
      additionalGradleOptions:
        description: 'Additional Gradle options'
        required: false
        default: ''

jobs:
  release-test:
    name: Release Test

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Set up JDK 11 and 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: |
          11
          17

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
      with:
        cache-read-only: false

    - name: Run Release Test
      run: './gradlew --no-daemon :jarhc-release-tests:test ${{ github.event.inputs.additionalGradleOptions }}'

    - name: Upload report
      uses: actions/upload-artifact@v7
      if: ${{ always() }}
      with:
        name: reports
        path: jarhc-release-tests/build/reports/tests/test
