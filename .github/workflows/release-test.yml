name: Release Test

on:
  workflow_dispatch:
    inputs:
      runner_os:
        description: 'Runner OS'
        required: false
        default: 'ubuntu-latest'
        type: choice
        options:
          - ubuntu-latest
          - windows-latest
          - macos-latest
      additionalGradleOptions:
        description: 'Additional Gradle options'
        required: false
        default: ''

jobs:
  release-test:
    name: Release Test

    runs-on: ${{ github.event.inputs.runner_os }}

    steps:

    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 11 and 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: |
          11
          17

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: false

    - name: Run Release Test
      shell: bash
      run: './gradlew --no-daemon :jarhc-release-test:test ${{ github.event.inputs.additionalGradleOptions }}'

    - name: Upload report
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: reports
        path: jarhc-release-tests/build/reports/tests/test
