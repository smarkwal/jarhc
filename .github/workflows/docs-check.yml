name: Docs Check

# Validate the documentation build on every pull request that touches the docs.
# Does NOT deploy anything.

on:
  pull_request:
    paths:
      - 'website/**'
      - '.github/workflows/docs-check.yml'

permissions:
  contents: read

jobs:
  build:
    name: Build (strict)
    runs-on: ubuntu-latest

    # All run steps execute inside the website/ folder, which holds mkdocs.yml
    # and the docs/ content.
    defaults:
      run:
        working-directory: website

    steps:

    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.12'
        cache: pip
        cache-dependency-path: website/requirements.txt

    - name: Install dependencies
      run: pip install --require-hashes -r requirements.txt

    - name: Build documentation
      run: mkdocs build --strict
