name: Docs Release

# Publish the docs for an official release to GitHub Pages and make it "latest".
# Triggered when a GitHub Release is published, or manually for a given version.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 3.0.0)'
        required: true

permissions:
  contents: write

# Serialize all deployments to the gh-pages branch to avoid push conflicts.
concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy release
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.12'
        cache: pip
        cache-dependency-path: docs-requirements.txt

    - name: Install dependencies
      run: pip install --require-hashes -r docs-requirements.txt

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Determine version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "release" ]; then
          VERSION="${{ github.event.release.tag_name }}"
        else
          VERSION="${{ github.event.inputs.version }}"
        fi
        # strip a leading "v" (e.g. v3.0.0 -> 3.0.0)
        VERSION="${VERSION#v}"
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

    - name: Deploy release docs and update 'latest'
      run: |
        mike deploy --push --update-aliases "${{ steps.version.outputs.version }}" latest
        mike set-default --push latest

    - name: Publish root robots.txt and sitemap.xml
      run: .github/scripts/publish-docs-root.sh
