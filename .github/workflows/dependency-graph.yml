name: Dependency Graph

on:
  push:
    # Don't run on Dependabot branches: this job needs contents:write to
    # submit the graph, but Dependabot runs get a read-only token, so the
    # submission can't succeed anyway. Avoids needless execution of bumped
    # dependencies on the runner.
    branches-ignore:
      - 'dependabot/**'
    paths:
      - '.github/**'
      - '**.gradle.kts'
  workflow_dispatch:
    inputs:
      dependencyGraphAction:
        type: choice
        description: 'Dependency graph action'
        required: true
        default: 'generate-and-submit'
        options:
          - generate-and-submit
          - generate-and-upload

permissions:
  contents: write

jobs:
  dependency-graph:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Generate dependency graph
      uses: gradle/actions/dependency-submission@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
      with:
        dependency-graph: ${{ github.event.inputs.dependencyGraphAction || 'generate-and-submit' }}
