name: Dependency Graph

on:
  push:
    # Don't run on Dependabot branches: this job needs contents:write to
    # submit the graph, but Dependabot runs get a read-only token, so the
    # submission can't succeed anyway. Avoids needless execution of bumped
    # dependencies on the runner.
    branches-ignore:
      - 'dependabot/**'
    paths:
      - '.github/**'
      - '**.gradle.kts'
  workflow_dispatch:
    inputs:
      dependencyGraphAction:
        type: choice
        description: 'Dependency graph action'
        required: true
        default: 'generate-and-submit'
        options:
          - generate-and-submit
          - generate-and-upload

permissions:
  contents: write

jobs:
  dependency-graph:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Generate dependency graph
      uses: gradle/actions/dependency-submission@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      with:
        dependency-graph: ${{ github.event.inputs.dependencyGraphAction || 'generate-and-submit' }}
